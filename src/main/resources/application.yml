server:
  port: 8080

spring:
  application:
    name: redis-learning

#H2 database config
  datasource:
    url: jdbc:h2:mem:redislearning
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

#Redis Config
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: -1ms

#Spring Cache
  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false

#Spring Session
  session:
    store-type: redis
    timeout: 1800s
    redis:
      namespace: spring:session

logging:
  level:
    com.practice.redis_learning: DEBUG

#Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method